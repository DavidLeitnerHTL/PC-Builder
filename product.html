<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktinfo | PC Builder</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            background-color: var(--bg-color, #121212);
            color: var(--text-color, #e0e0e0);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .product-container {
            max-width: 800px;
            margin: 40px auto;
            background-color: var(--card-bg, #1e1e2e);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4da6ff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #1a8cff;
        }

        .product-header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .product-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none; 
        }

        .spec-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        .spec-table th, .spec-table td {
            padding: 12px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        .spec-table th {
            width: 40%;
            color: #888;
            font-weight: normal;
            text-transform: capitalize;
        }

        .amazon-section {
            background-color: rgba(255, 153, 0, 0.1);
            border-left: 4px solid #ff9900;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin-top: 30px;
            text-align: center;
        }

        .amazon-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #fff;
        }

        .amazon-btn {
            display: inline-block;
            background-color: #ff9900;
            color: #000;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .amazon-btn:hover {
            background-color: #e68a00;
        }

        #loading-text {
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="product-container">
        <a href="index.html" class="back-link">&larr; Zurück zur Übersicht</a>
        
        <div id="loading-text">Produktdaten werden geladen...</div>

        <div id="product-content" style="display: none;">
            <div class="product-header">
                <img id="product-img" class="product-image" src="" alt="">
                <h1 id="product-name">Produktname</h1>
                <h2 id="product-price" style="color: #4da6ff;">Preis</h2>
            </div>

            <h3>Spezifikationen</h3>
            <table class="spec-table" id="spec-table">
                <!-- Data will be populated here -->
            </table>

            <div class="amazon-section">
                <h3 id="amazon-product-name">Vollständiger Produktname</h3>
                <a id="amazon-link" href="#" target="_blank" rel="noopener noreferrer" class="amazon-btn">
                    Auf Amazon ansehen
                </a>
            </div>
        </div>
    </div>

    <script>
        // Function to cleanly format JSON keys
        const formatJsonKey = (keyString) => {
            return keyString.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        };

        const currentUrlParams = new URLSearchParams(window.location.search);
        const categoryParameter = currentUrlParams.get('category');
        const productIdParameter = currentUrlParams.get('id');

        const loadingTextElement = document.getElementById('loading-text');
        const productContentWrapper = document.getElementById('product-content');

        if (categoryParameter && productIdParameter) {
            // Fetch data from the corresponding category JSON
            fetch(`processed_data/${categoryParameter}.json`)
                .then(networkResponse => {
                    if (!networkResponse.ok) throw new Error("Kategorie-Datei nicht gefunden");
                    return networkResponse.json();
                })
                .then(parsedProductData => {
                    // Find the specific product via ID
                    const selectedProduct = parsedProductData.find(item => item.id === productIdParameter);

                    if (selectedProduct) {
                        loadingTextElement.style.display = 'none';
                        productContentWrapper.style.display = 'block';

                        document.getElementById('product-name').textContent = selectedProduct.name;
                        document.getElementById('product-price').textContent = selectedProduct.price ? `${selectedProduct.price} €` : 'Preis derzeit unbekannt';

                        if (selectedProduct.image) {
                            const imageTag = document.getElementById('product-img');
                            imageTag.src = selectedProduct.image;
                            imageTag.alt = selectedProduct.name;
                            imageTag.style.display = 'block';
                        }

                        // Populate the specifications table
                        const specificationsTable = document.getElementById('spec-table');
                        for (const [propertyKey, propertyValue] of Object.entries(selectedProduct)) {
                            // Ignored keys that shouldn't appear in the standard specs list
                            const blacklistedKeys = ['name', 'price', 'id', 'image', 'link', 'amazon_sku'];
                            if (blacklistedKeys.includes(propertyKey.toLowerCase())) continue;
                            if (propertyValue === null || propertyValue === "" || propertyValue === "N/A") continue;

                            const tableRow = document.createElement('tr');
                            
                            const headerCell = document.createElement('th');
                            headerCell.textContent = formatJsonKey(propertyKey);
                            
                            const dataCell = document.createElement('td');
                            dataCell.textContent = propertyValue;
                            
                            tableRow.appendChild(headerCell);
                            tableRow.appendChild(dataCell);
                            specificationsTable.appendChild(tableRow);
                        }

                        // Set full name and dynamic Amazon link logic
                        document.getElementById('amazon-product-name').textContent = selectedProduct.name;
                        
                        let finalAmazonUrl = `https://www.amazon.de/s?k=${encodeURIComponent(selectedProduct.name)}`;
                        
                        // Use exact Amazon SKU if available in the JSON
                        if (selectedProduct.amazon_sku && selectedProduct.amazon_sku.trim() !== "") {
                            finalAmazonUrl = `https://www.amazon.de/dp/${selectedProduct.amazon_sku}`;
                        }
                        
                        document.getElementById('amazon-link').href = finalAmazonUrl;

                    } else {
                        loadingTextElement.textContent = "Das gewünschte Produkt wurde nicht gefunden.";
                    }
                })
                .catch(fetchError => {
                    console.error("Fetch error:", fetchError);
                    loadingTextElement.textContent = "Fehler beim Laden der Produktdaten. Bitte überprüfe den processed_data Ordner.";
                });
        } else {
            loadingTextElement.textContent = "Kein Produkt ausgewählt (URL Parameter fehlen).";
        }
    </script>
</body>
</html>

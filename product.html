<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produktinfo | PC Builder 2026</title>
  <meta name="description" content="Detaillierte Spezifikationen und Kaufoptionen für PC-Komponenten.">
  
  <!-- Sync theme immediately -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else if (savedTheme === 'dark' || systemPrefersDark) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .product-container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 2rem;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      transition: opacity 0.2s;
      border: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-pill);
    }

    .back-link:hover {
      opacity: 0.8;
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .product-header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .product-image {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      display: none;
      border: 1px solid var(--border-color);
    }
    
    #product-name {
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 0.5rem;
    }

    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 15px;
    }

    .tech-tag {
      background: var(--accent-glow);
      color: var(--accent-color);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid rgba(255, 107, 0, 0.15);
      font-family: 'Space Grotesk', sans-serif;
    }

    .spec-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
    }

    .spec-table th, .spec-table td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border-color);
      text-align: left;
      font-size: 0.9rem;
    }

    .spec-table th {
      width: 40%;
      color: var(--text-secondary);
      font-weight: 400;
      text-transform: capitalize;
    }

    .spec-table td {
      color: var(--text-primary);
      font-weight: 500;
    }

    .spec-table tr:hover {
      background: var(--hover-bg);
    }

    .amazon-section {
      background: var(--accent-glow);
      border-left: 3px solid var(--accent-color);
      padding: 1.5rem;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin-top: 2rem;
      text-align: center;
    }

    .amazon-section h3 {
      margin-top: 0;
      margin-bottom: 1rem;
      color: var(--text-primary);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
    }

    .amazon-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent-color);
      color: #fff;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      font-weight: 700;
      border-radius: var(--radius-pill);
      font-family: 'Space Grotesk', sans-serif;
      transition: all var(--transition-fast);
      box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
    }

    .amazon-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(255, 107, 0, 0.4);
      color: #fff;
    }

    #loading-text {
      text-align: center;
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-family: 'Space Grotesk', sans-serif;
      padding: 3rem 0;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Header injected by config.js -->
  <div id="site-header"></div>

  <main class="flex-grow-1 py-5">
    <div class="container">
      <div class="product-container fade-in-up">
        <div class="top-bar">
          <a href="builder.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Zurück
          </a>
        </div>
        
        <div id="loading-text">
          <div class="newtons-cradle mb-3" style="margin: 0 auto;">
            <div class="newtons-cradle__dot"></div>
            <div class="newtons-cradle__dot"></div>
            <div class="newtons-cradle__dot"></div>
            <div class="newtons-cradle__dot"></div>
          </div>
          Produktdaten werden geladen...
        </div>

        <div id="product-content" style="display: none;">
          <div class="product-header">
            <img id="product-img" class="product-image" src="" alt="">
            <h1 id="product-name">Produktname</h1>
            <div id="product-tags" class="product-tags"></div>
            <h2 id="product-price" class="text-gradient" style="font-family: 'Space Grotesk', sans-serif;">Preis</h2>
          </div>

          <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; margin-bottom: 1rem;">
            <span class="dot-accent"></span>Spezifikationen
          </h3>
          <table class="spec-table" id="spec-table"></table>

          <div class="amazon-section">
            <h3 id="amazon-product-name">Ganzer Produktname</h3>
            <a id="amazon-link" href="#" target="_blank" rel="noopener noreferrer" class="amazon-btn">
              <i class="fab fa-amazon"></i> Auf Amazon ansehen
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer injected by config.js -->
  <div id="site-footer"></div>

  <script>
    const formatKey = (key) => {
      return key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    };

    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category') || sessionStorage.getItem('currentCategory');
    const productName = urlParams.get('name') || sessionStorage.getItem('currentProduct');

    const loadingText = document.getElementById('loading-text');
    const productContent = document.getElementById('product-content');

    if (category && productName) {
      fetch(`processed_data/${category}.json`)
        .then(response => {
          if (!response.ok) throw new Error("Category file not found");
          return response.json();
        })
        .then(data => {
          const product = data.find(p => p.name === productName);

          if (product) {
            loadingText.style.display = 'none';
            productContent.style.display = 'block';

            const displayName = product.clean_name || product.name;
            document.getElementById('product-name').textContent = displayName;
            document.getElementById('product-price').textContent = product.price ? `${product.price} €` : 'Preis derzeit unbekannt';

            const tagsContainer = document.getElementById('product-tags');
            if (product.tags && Array.isArray(product.tags)) {
              product.tags.forEach(tagText => {
                const span = document.createElement('span');
                span.className = 'tech-tag';
                span.textContent = tagText;
                tagsContainer.appendChild(span);
              });
            }

            if (product.image) {
              const imgEl = document.getElementById('product-img');
              imgEl.src = product.image;
              imgEl.alt = displayName;
              imgEl.style.display = 'block';
            }

            const table = document.getElementById('spec-table');
            for (const [key, value] of Object.entries(product)) {
              if (['name', 'clean_name', 'tags', 'price', 'id', 'image', 'link', 'amazon_sku'].includes(key.toLowerCase())) continue;
              if (value === null || value === "" || value === "N/A") continue;

              const row = document.createElement('tr');
              const th = document.createElement('th');
              th.textContent = formatKey(key);
              const td = document.createElement('td');
              td.textContent = value;
              row.appendChild(th);
              row.appendChild(td);
              table.appendChild(row);
            }

            document.getElementById('amazon-product-name').textContent = product.name;
            let amazonUrl = `https://www.amazon.de/s?k=${encodeURIComponent(product.name)}`;
            if (product.amazon_sku) {
              amazonUrl = `https://www.amazon.de/dp/${product.amazon_sku}`;
            }
            document.getElementById('amazon-link').href = amazonUrl;

            sessionStorage.removeItem('currentCategory');
            sessionStorage.removeItem('currentProduct');
          } else {
            loadingText.textContent = "Das gewünschte Produkt wurde nicht gefunden.";
          }
        })
        .catch(error => {
          console.error("Loading error:", error);
          loadingText.textContent = "Fehler beim Laden der Produktdaten.";
        });
    } else {
      loadingText.textContent = "Kein Produkt ausgewählt (URL Parameter fehlen).";
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="config.js"></script>
  <script defer src="script.js"></script>
</body>
</html>

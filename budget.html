<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Budget-Optimierer | PC Builder</title>
  <meta name="description" content="Budget eingeben – automatisch das beste PC-Build innerhalb deines Budgets berechnen.">
  <meta property="og:title" content="Budget-Optimierer | PC Builder">
  <meta property="og:url" content="https://pc-builder.at/budget.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PC Builder">

  <script>
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    else if (savedTheme === 'dark' || systemPrefersDark) document.documentElement.setAttribute('data-theme', 'dark');
  </script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <style>
    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    #budget-display {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--accent-color);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .budget-slider {
      width: 100%;
      accent-color: var(--accent-color);
      height: 6px;
      cursor: pointer;
    }
    .alloc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
    .alloc-chip {
      background: var(--hover-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
    }
    .alloc-chip .chip-label {
      color: var(--text-secondary);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .alloc-chip .chip-val {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .result-table th, .result-table td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
    }
    .result-table th {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .result-table .prod-name {
      font-weight: 500;
      color: var(--text-primary);
    }
    .result-table .prod-price {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--accent-color);
      text-align: right;
      white-space: nowrap;
    }
    .result-table .no-prod {
      color: var(--text-secondary);
      font-style: italic;
    }
    .total-row td {
      border-top: 2px solid var(--border-color);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
    }
    .alloc-bar-bg {
      height: 6px;
      background: var(--border-color);
      border-radius: var(--radius-pill);
      overflow: hidden;
      margin-top: 0.35rem;
    }
    .alloc-bar-fill {
      height: 100%;
      background: var(--accent-color);
      border-radius: var(--radius-pill);
    }
    .cat-icon { width: 1.4rem; text-align: center; }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <div id="site-header"></div>

  <main class="flex-grow-1 py-5">
    <div class="container" style="max-width:820px">

      <section class="page-hero text-center" style="padding: clamp(40px,8vw,80px) 0 clamp(30px,5vw,60px)">
        <div class="d-flex gap-2 mb-3 justify-content-center fade-in-up">
          <span>Tools — Budget</span>
        </div>
        <h1 class="fade-in-up delay-1">Budget <span class="text-gradient">Optimierer</span></h1>
        <p class="fade-in-up delay-2">Budget eingeben – automatisch das beste Build berechnen.</p>
        <div class="accent-line fade-in-up delay-3"></div>
      </section>

      <!-- Budget Input -->
      <div class="tool-card fade-in-up">
        <div id="budget-display">800 €</div>
        <input type="range" class="budget-slider" id="budget-slider"
               min="300" max="5000" step="50" value="800"
               oninput="onSlider(this.value)">
        <div class="d-flex justify-content-between mt-1" style="font-size:0.78rem;color:var(--text-secondary)">
          <span>300 €</span>
          <div class="d-flex align-items-center gap-2">
            <input type="number" id="budget-input" class="form-control form-control-sm text-center"
                   style="width:100px" value="800" min="300" max="5000" step="50"
                   oninput="onManualInput(this.value)">
            <span>€</span>
          </div>
          <span>5000 €</span>
        </div>

        <!-- Allocation preview -->
        <div class="alloc-grid" id="alloc-grid"></div>

        <div class="text-center mt-3">
          <button class="btn btn-accent fw-bold px-5" onclick="buildOptimal()" id="calc-btn">
            <i class="fas fa-wand-magic-sparkles me-2"></i>Build optimieren
          </button>
        </div>
      </div>

      <!-- Result -->
      <div id="result-wrap" style="display:none">
        <div class="tool-card">
          <h5 class="mb-3" style="font-family:'Space Grotesk',sans-serif">
            <span class="dot-accent"></span> Empfohlenes Build
          </h5>
          <div class="table-responsive">
            <table class="result-table">
              <thead>
                <tr>
                  <th>Komponente</th>
                  <th>Produkt</th>
                  <th style="text-align:right">Preis</th>
                </tr>
              </thead>
              <tbody id="result-body"></tbody>
            </table>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            <span style="font-size:0.82rem;color:var(--text-secondary)">
              <i class="fas fa-info-circle me-1"></i>Preise von Amazon.de, täglich aktualisiert.
            </span>
            <a href="builder.html" class="btn btn-outline-accent btn-sm">
              <i class="fas fa-sliders me-1"></i>Im Konfigurator öffnen
            </a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
  <script>
    const ALLOC = [
      { key: 'GPU',        label: 'GPU',        icon: 'fa-display',        pct: 33 },
      { key: 'CPU',        label: 'CPU',        icon: 'fa-microchip',      pct: 19 },
      { key: 'Motherboard',label: 'Mainboard',  icon: 'fa-server',         pct: 12 },
      { key: 'RAM',        label: 'RAM',        icon: 'fa-memory',         pct: 10 },
      { key: 'Storage',    label: 'Storage',    icon: 'fa-hard-drive',     pct:  8 },
      { key: 'PSU',        label: 'PSU',        icon: 'fa-plug',           pct:  8 },
      { key: 'PCCase',     label: 'Gehäuse',    icon: 'fa-computer',       pct:  6 },
      { key: 'CPUCooler',  label: 'Kühler',     icon: 'fa-fan',            pct:  4 },
    ];

    function getBudget() {
      return parseInt(document.getElementById('budget-slider').value) || 800;
    }

    function onSlider(val) {
      document.getElementById('budget-display').textContent = `${val} €`;
      document.getElementById('budget-input').value = val;
      renderAllocGrid(parseInt(val));
    }

    function onManualInput(val) {
      const v = Math.max(300, Math.min(5000, parseInt(val) || 800));
      document.getElementById('budget-slider').value = v;
      document.getElementById('budget-display').textContent = `${v} €`;
      renderAllocGrid(v);
    }

    function renderAllocGrid(budget) {
      const grid = document.getElementById('alloc-grid');
      grid.innerHTML = '';
      ALLOC.forEach(a => {
        const slice = Math.round(budget * a.pct / 100);
        const chip = document.createElement('div');
        chip.className = 'alloc-chip';
        chip.innerHTML = `
          <div class="chip-label"><i class="fas ${a.icon} me-1"></i>${a.label}</div>
          <div class="chip-val">${slice} €</div>
          <div class="alloc-bar-bg">
            <div class="alloc-bar-fill" style="width:${a.pct * 3}%"></div>
          </div>`;
        grid.appendChild(chip);
      });
    }

    function bestFit(products, budget) {
      const eligible = products
        .filter(p => p.available !== false && p.price && p.price <= budget)
        .sort((a, b) => b.price - a.price);
      if (eligible.length) return eligible[0];
      // Nothing fits → cheapest available
      const fallback = products
        .filter(p => p.available !== false && p.price)
        .sort((a, b) => a.price - b.price);
      return fallback[0] || null;
    }

    async function buildOptimal() {
      const budget = getBudget();
      const btn = document.getElementById('calc-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Berechne…';

      try {
        const results = await Promise.all(
          ALLOC.map(async a => {
            const res = await fetch(`processed_data/${a.key}.json`);
            const products = await res.json();
            const slice = Math.round(budget * a.pct / 100);
            const pick = bestFit(products, slice);
            return { ...a, slice, pick };
          })
        );

        let totalPrice = 0;
        let html = '';
        results.forEach(r => {
          const p = r.pick;
          if (p) totalPrice += p.price;
          const nameCell = p
            ? `<a href="product.html?category=${encodeURIComponent(r.key)}&name=${encodeURIComponent(p.name)}" class="prod-name text-decoration-none">${p.clean_name || p.name}</a>`
            : '<span class="no-prod">Kein Produkt in diesem Budget</span>';
          const priceCell = p
            ? `<td class="prod-price">${p.price} €</td>`
            : '<td class="prod-price" style="color:var(--text-secondary)">—</td>';
          html += `<tr>
            <td><i class="fas ${r.icon} cat-icon me-2" style="color:var(--accent-color)"></i>${r.label}</td>
            <td>${nameCell}</td>
            ${priceCell}
          </tr>`;
        });

        const remaining = budget - totalPrice;
        html += `<tr class="total-row">
          <td colspan="2">Gesamt</td>
          <td class="prod-price">${totalPrice.toFixed(0)} €</td>
        </tr>`;
        if (remaining > 0) {
          html += `<tr>
            <td colspan="2" style="color:var(--text-secondary);font-size:0.82rem">Restbudget</td>
            <td style="text-align:right;font-size:0.82rem;color:#22c55e">+${remaining.toFixed(0)} €</td>
          </tr>`;
        }

        document.getElementById('result-body').innerHTML = html;
        document.getElementById('result-wrap').style.display = '';
        document.getElementById('result-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-wand-magic-sparkles me-2"></i>Build optimieren';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSiteLayout();
      hidePreloader();
      renderAllocGrid(800);
    });
  </script>
</body>
</html>

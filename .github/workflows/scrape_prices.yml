name: Daily Price Scraper

on:
  schedule:
    # Runs at 03:00 UTC daily — 1h after sync_opendb so data is fresh.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Single category to scrape (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    # Must run on your home PC (residential IP) — GitHub-hosted runners
    # are on Azure IPs that Amazon permanently blocks with captcha.
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: scraper
        shell: bash
        run: npm ci

      - name: Run price scraper
        working-directory: scraper
        shell: bash
        # Empty category string → process.argv[2] is '' → '' || null = null → all categories
        run: node scraper.js "${{ github.event.inputs.category }}"

      - name: Commit and push updated prices
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_data/
          if git diff --staged --quiet; then
            echo "No price changes — nothing to commit."
            exit 0
          fi
          git commit -m "Auto-update prices [skip ci]"
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push && break
            echo "Push conflict — retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done

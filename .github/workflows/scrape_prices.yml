name: Daily Price Scraper

on:
  schedule:
    # Runs at 03:00 UTC daily — 1h after sync_opendb so data is fresh.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Single category to scrape (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    # Must run on your home PC (residential IP) — GitHub-hosted runners
    # are on Azure IPs that Amazon permanently blocks with captcha.
    runs-on: self-hosted
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: scraper
        shell: bash
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Configure git
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run price scraper
        working-directory: scraper
        shell: bash
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
        # Empty category string → process.argv[2] is '' → '' || null = null → all categories
        # Scraper commits after each category so partial results survive a crash.
        run: node --max-old-space-size=512 scraper.js "${{ github.event.inputs.category }}"

      - name: Push commits
        if: always()
        shell: bash
        run: |
          git add processed_data/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update prices (partial) [skip ci]"
          fi
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push && break
            echo "Push conflict — retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done

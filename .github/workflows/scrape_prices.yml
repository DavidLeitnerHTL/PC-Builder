name: Daily Price Scraper

on:
  schedule:
    # Runs at 03:00 UTC daily -- 1h after sync_opendb so data is fresh.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Single category to scrape (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    # Runs on GitHub-hosted ubuntu-latest (no OOM), but all network traffic
    # is routed through a WireGuard tunnel to the home Pi so Amazon sees
    # the residential IP instead of an Azure datacenter IP.
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Connect to Tailscale exit node (residential IP)
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --exit-node=100.101.155.64 --exit-node-allow-lan-access=false

      - name: Install dependencies
        working-directory: scraper
        shell: bash
        run: npm ci

      - name: Configure git
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run price scraper
        working-directory: scraper
        shell: bash
        run: node scraper.js "${{ github.event.inputs.category }}"

      - name: Push commits
        if: always()
        shell: bash
        run: |
          git add processed_data/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update prices (partial) [skip ci]"
          fi
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH" && git push && break
            echo "Push conflict -- retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
